name: Build and Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: java17/Dockerfile
            image: diareuse/minecraft:fabric-java17
          - dockerfile: java21/Dockerfile
            image: diareuse/minecraft:fabric-java21
          - dockerfile: java25/Dockerfile
            image: diareuse/minecraft:fabric-java25
          - dockerfile: latest/Dockerfile
            image: diareuse/minecraft:fabric

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        run: |
          VERSIONED_IMAGE="${{ matrix.image }}-${GITHUB_REF_NAME}"
          docker buildx build \
            --platform linux/amd64,linux/arm64/v8,linux/riscv64,linux/ppc64le,linux/s390x \
            -t "${{ matrix.image }}" \
            -t "${VERSIONED_IMAGE}" \
            -f "${{ matrix.dockerfile }}" \
            --push .